<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cargando...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a3c34;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #e8f5f0;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 24px;
            object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.3));
        }

        .loader-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
        }

        .loader {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(74, 144, 117, 0.3);
            border-top: 3px solid #4a9075;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-inner {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 3px solid rgba(74, 144, 117, 0.2);
            border-bottom: 3px solid #6bbfa0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .brand {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .message {
            font-size: 15px;
            color: #8fbfa9;
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 180px;
            height: 3px;
            background: rgba(74, 144, 117, 0.25);
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9075, #6bbfa0);
            width: 0%;
            animation: fillProgress 3s ease-out forwards;
        }

        @keyframes fillProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .redirect-message {
            margin-top: 25px;
            font-size: 13px;
            color: #5a8a75;
        }


    </style>
</head>

<body>
    <div class="container">
        <img src="./img/logo.jpg" alt="Monteverde Cloud" class="logo">

        <div class="loader-wrapper">
            <div class="loader"></div>
            <div class="loader-inner"></div>
        </div>

        <div class="brand">Monteverde Cloud</div>
        <div class="message">Preparando tu experiencia...</div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="redirect-message">Redirigiendo en 3 segundos</div>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = 'https://monteverdecloud.com';
        }, 3000);

        let seconds = 3;
        const messageElement = document.querySelector('.redirect-message');

        const countdown = setInterval(function () {
            seconds--;
            if (seconds > 0) {
                messageElement.textContent = `Redirigiendo en ${seconds} segundo${seconds !== 1 ? 's' : ''}`;
            } else {
                clearInterval(countdown);
                messageElement.textContent = 'Conectando...';
            }
        }, 1000);
    </script>
</body>

</html>
